<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' ws://localhost:* http://localhost:*;">
	<meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0 viewport-fit=cover, minimal-ui">
	<meta name="HandheldFriendly" content="True">
	<meta name="MobileOptimized" content="320">
	<meta http-equiv="cleartype" content="on">

	<style>
		/* hide all scrollbars (doesn't work on Chrome mobile) */
		::-webkit-scrollbar { display: none; }
		.v-application { background-color: transparent !important; }
		.v-overlay__scrim {
			opacity: 1 !important;
			background-color: transparent;
			backdrop-filter: blur(0);
			transition: background-color 0.3s ease, backdrop-filter 0.3s ease;
		}
		.v-overlay--active .v-overlay__scrim {
			background-color: rgba(0, 0, 0, 0.4);
			backdrop-filter: blur(3px);
		}
		body, .v-application {
			font-family: 'Manrope', system-ui, -apple-system, sans-serif !important;
		}
		body, body *:not(.v-icon):not(.mdi) {
			letter-spacing: 1.15px !important;
		}
		.cursor-pointer { cursor: pointer; }

		/* Global Glassmorphic Tooltip Override */
		.v-overlay-container .v-tooltip .v-overlay__content {
			background: rgba(22, 28, 42, 0.82) !important;
			backdrop-filter: blur(10px) !important;
			-webkit-backdrop-filter: blur(10px) !important;
			border: 1px solid rgba(255, 255, 255, 0.08) !important;
			border-radius: 8px !important;
			box-shadow: 0 6px 16px rgba(0, 0, 0, 0.35) !important;
			color: #f0f4ff !important;
			font-family: 'Manrope', system-ui, -apple-system, sans-serif !important;
			font-size: 0.75rem !important;
			font-weight: 500 !important;
			letter-spacing: 0.025em !important;
			padding: 6px 12px !important;
			text-transform: none !important;
			line-height: 1.4 !important;
			opacity: 0.85 !important;
		}
	</style>
</head>

<body>
	<div id="app"></div>
	<script type="module" src="./src/main.ts"></script>
</body>
</html>
